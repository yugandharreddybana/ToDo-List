spring:
  application:
    name: productivity-suite-backend
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:productivity}?sslmode=${POSTGRES_SSL_MODE:prefer}
    username: ${POSTGRES_USER:productivity}
    password: ${POSTGRES_PASSWORD:changeme}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: UTC
    open-in-view: false
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /

app:
  jwt:
    secret: ${APP_JWT_SECRET:replace-me-access-secret}
    access-ttl-seconds: ${JWT_ACCESS_TTL:900}
    refresh-ttl-seconds: ${JWT_REFRESH_TTL:604800}
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3001}

management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      probes:
        enabled: true

logging:
  level:
    root: INFO
    com.productivitysuite: DEBUG
