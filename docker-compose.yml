version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: todo-postgres
    environment:
      POSTGRES_USER: todo_user
      POSTGRES_PASSWORD: todo_password
      POSTGRES_DB: todo_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U todo_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: todo-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./deployments/Backend
      dockerfile: Dockerfile
    container_name: todo-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/todo_db
      SPRING_DATASOURCE_USERNAME: todo_user
      SPRING_DATASOURCE_PASSWORD: todo_password
      SPRING_JPA_PROPERTIES_HIBERNATE_DEFAULT_SCHEMA: todo_list
      APP_JWT_SECRET: ${APP_JWT_SECRET:-ThisIsASuperSecretKeyThatIsAtLeast32BytesLong!!}
      APP_CORS_ALLOWED_ORIGINS: http://localhost:3001,http://middleware:3001
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  middleware:
    build:
      context: ./deployments/Middleware
      dockerfile: Dockerfile
    container_name: todo-middleware
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      PORT: 3001
      CORS_ORIGIN: http://localhost:3002
      REDIS_URL: redis://redis:6379
      BACKEND_URL: http://backend:8080
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-ThisIsASuperSecretKeyThatIsAtLeast32BytesLong!!}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-AnotherSuperSecretKeyThatIsAtLeast32BytesLong!!}
      JWT_ACCESS_TTL: 900
      JWT_REFRESH_TTL_DAYS: 7
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: claude-opus-4-6
    depends_on:
      - postgres
      - redis
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./deployments/UI
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:3001
        VITE_APP_NAME: "Productivity Suite"
    container_name: todo-frontend
    ports:
      - "3002:3002"
    depends_on:
      - middleware
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3002"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
